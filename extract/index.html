<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDI0IDEwMjQiPjxwYXRoIGZpbGw9IiM0QjlBRkMiIGQ9Ik03NjggMTAyNEgyNTZDMTEyLjY0IDEwMjQgMCA5MTEuMzYgMCA3NjhWMjU2QzAgMTEyLjY0IDExMi42NCAwIDI1NiAwaDUxMmMxNDMuMzYgMCAyNTYgMTEyLjY0IDI1NiAyNTZ2NTEyYzAgMTQzLjM2LTExMi42NCAyNTYtMjU2IDI1Nm0xMDIuNC03NjhjMC01Ni4zMi00Ni4wOC0xMDIuNC0xMDIuNC0xMDIuNEgyNTZjLTU2LjMyIDAtMTAyLjQgNDYuMDgtMTAyLjQgMTAyLjR2NjE0LjRMMjUwLjg4IDc2OGw0Ni4wOCAxMDIuNEwzOTQuMjQgNzY4bDQ2LjA4IDEwMi40TDUzNy42IDc2OGw0Ni4wOCAxMDIuNEw2ODAuOTYgNzY4bDQ2LjA4IDEwMi40TDgyNC4zMiA3NjhsNDYuMDggMTAyLjR6bS0xMjggMjA0LjhIMjgxLjZjLTE1LjM2IDAtMjUuNi0xMC4yNC0yNS42LTI1LjZzMTAuMjQtMjUuNiAyNS42LTI1LjZoNDYwLjhjMTUuMzYgMCAyNS42IDEwLjI0IDI1LjYgMjUuNnMtMTAuMjQgMjUuNi0yNS42IDI1LjZtMC0xNTMuNkgyODEuNmMtMTUuMzYgMC0yNS42LTEwLjI0LTI1LjYtMjUuNnMxMC4yNC0yNS42IDI1LjYtMjUuNmg0NjAuOGMxNS4zNiAwIDI1LjYgMTAuMjQgMjUuNiAyNS42cy0xMC4yNCAyNS42LTI1LjYgMjUuNiIvPjwvc3ZnPg==">
    <title>发票批量提取工具</title>
    <meta name="description" content="批量提取PDF发票信息并导出Excel">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- PDF.js -->
    <script src="https://s4.zstatic.net/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- SheetJS for Excel export -->
    <script src="https://s4.zstatic.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="../static/tools/css/extract.css">
    <link rel="stylesheet" href="../static/components/common.css">
</head>
<body>
    <div class="app">
        <!-- 公共 Header -->
        <div id="header-container"></div>
        <script>
            (function() {
                try {
                    const cachedHeader = sessionStorage.getItem('shared-component-cache:components/header.html');
                    const container = document.getElementById('header-container');
                    if (cachedHeader && container) {
                        container.innerHTML = cachedHeader;
                        container.__componentMarkup = cachedHeader;
                        container.__componentInitialized = false;
                    }
                } catch (error) {}
            })();
        </script>

        <!-- Page Title -->
        <section class="page-title">
            <div class="container">
                <h1 class="page-heading">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    发票提取工具
                </h1>
                <p class="subtitle">批量解析PDF发票，一键导出Excel</p>
            </div>
        </section>

        <!-- Main Content -->
        <main class="main">
            <div class="container">
                <!-- Upload Section -->
                <section class="upload-section" id="uploadSection">
                    <div class="upload-card">
                        <input 
                            type="file" 
                            id="fileInput" 
                            class="file-input" 
                            multiple 
                            accept=".pdf"
                            aria-label="选择PDF文件"
                        >
                        <div class="upload-area" id="uploadArea">
                            <div class="upload-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </div>
                            <p class="upload-text">点击或拖拽PDF文件到此处</p>
                            <p class="upload-hint">支持批量上传多个发票文件</p>
                        </div>
                    </div>

                    <!-- Action Buttons (Moved above file list) -->
                    <div class="actions" id="actions" style="display: none;">
                        <button class="btn btn-primary" id="parseBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                            开始提取
                        </button>
                    </div>

                    <!-- File List -->
                    <div class="file-list" id="fileList" style="display: none;">
                        <div class="file-list-header">
                            <span class="file-count">已选择 <strong id="fileCount">0</strong> 个文件</span>
                            <button class="btn-text" id="clearFiles">清空</button>
                        </div>
                        <ul class="file-items" id="fileItems"></ul>
                    </div>
                </section>

                <!-- Progress Section -->
                <section class="progress-section" id="progressSection" style="display: none;">
                    <div class="progress-card">
                        <div class="progress-header">
                            <span class="progress-title">正在提取发票信息...</span>
                            <span class="progress-count" id="progressCount">0/0</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <p class="progress-current" id="progressCurrent"></p>
                    </div>
                </section>

                <!-- Results Section -->
                <section class="results-section" id="resultsSection" style="display: none;">
                    <div class="results-header">
                        <h2 class="results-title">提取结果</h2>
                        <div class="results-actions">
                            <button class="btn btn-secondary" id="reuploadBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                重新上传
                            </button>
                            <button class="btn btn-secondary" id="exportCsvBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                导出 CSV
                            </button>
                            <button class="btn btn-secondary" id="exportExcelBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="9" y1="3" x2="9" y2="21"></line>
                                </svg>
                                导出 Excel
                            </button>
                        </div>
                    </div>

                    <div class="table-container" style="overflow-x: auto;">
                        <table class="results-table" id="resultsTable" style="min-width: 1200px;">
                            <thead>
                                <tr>
                                    <th>文件名</th>
                                    <th>发票类型</th>
                                    <th>发票号码</th>
                                    <th>开票日期</th>
                                    <th>购买方名称</th>
                                    <th>购买方税号</th>
                                    <th>销售方名称</th>
                                    <th>销售方税号</th>
                                    <th>金额</th>
                                    <th>税额</th>
                                    <th>总额小写</th>
                                    <th>总额大写</th>
                                    <th>备注</th>
                                    <th>开票人</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody"></tbody>
                        </table>
                    </div>
                </section>

                <!-- Empty State -->
                <section class="empty-state" id="emptyState">
                </section>
            </div>
        </main>

        <!-- 公共 Footer -->
        <div id="footer-container"></div>

        <!-- Toast -->
        <div class="toast" id="toast" role="alert" aria-live="polite">
            <span class="toast-message" id="toastMessage"></span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../static/tools/js/common.js"></script>
    <script src="../static/components/site-config.js"></script>
    <script src="../static/components/components.js"></script>
    <script src="../static/tools/js/extract.js"></script>
</body>
</html>
